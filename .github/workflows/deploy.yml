name: Deploy Portofolio to GitHub Pages

on:
    push:
        branches:
            - main # Menjalankan pipeline saat push ke master

permissions:
    contents: write

jobs:
    build_and_deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22 # Menggunakan versi Node yang kompatibel dengan project kamu
                  cache: "npm"

            - name: Install Dependencies
              run: npm install

            - name: Build Project
              run: npm run build

            - name: Deploy to Release Branch
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./dist
                  publish_branch: release/production # Branch tujuan untuk GitHub Pages
                  force_orphan: true
